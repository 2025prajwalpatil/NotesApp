<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Notes – Login Notes App</title>
    <meta name="description" content="View and manage your personal notes"/>
    <style>
        :root {
            --bg:       #0f1117;
            --surface:  #1a1d27;
            --surface2: #222637;
            --border:   #2e3244;
            --accent:   #6c63ff;
            --accent-h: #8a84ff;
            --danger:   #ff5c5c;
            --danger-h: #ff7c7c;
            --text:     #e2e8f0;
            --muted:    #8892a4;
            --radius:   12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* ── Top nav ───────────────────────────────────── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-user {
            color: var(--muted);
            font-size: .875rem;
        }

        .nav-user span {
            color: var(--accent);
            font-weight: 600;
        }

        .btn-logout {
            padding: .45rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: .875rem;
            cursor: pointer;
            text-decoration: none;
            transition: border-color .2s, color .2s;
        }

        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ── Main content ──────────────────────────────── */
        main {
            max-width: 760px;
            margin: 2.5rem auto;
            padding: 0 1.5rem 4rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: .5rem;
        }

        .page-sub {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        /* ── Add-note form card ────────────────────────── */
        .add-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .add-card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 1rem;
        }

        .add-row {
            display: flex;
            gap: .75rem;
        }

        .add-row textarea {
            flex: 1;
            padding: .75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .95rem;
            resize: vertical;
            min-height: 70px;
            outline: none;
            transition: border-color .2s;
            font-family: inherit;
        }

        .add-row textarea:focus { border-color: var(--accent); }

        .btn-add {
            align-self: flex-end;
            padding: .75rem 1.4rem;
            background: var(--accent);
            color: #fff;
            font-size: .95rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s, transform .1s;
        }

        .btn-add:hover  { background: var(--accent-h); }
        .btn-add:active { transform: scale(.97); }

        /* ── Notes list ────────────────────────────────── */
        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .notes-header h2 { font-size: 1.1rem; font-weight: 700; }

        .count-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: .8rem;
            padding: .2rem .6rem;
            border-radius: 999px;
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 3rem 1rem;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        .empty-state .emoji { font-size: 2.5rem; margin-bottom: .75rem; }

        /* ── Note card ─────────────────────────────────── */
        .note-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem 1.25rem;
            margin-bottom: .85rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            transition: border-color .2s, transform .15s;
        }

        .note-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .note-content {
            flex: 1;
            font-size: .95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .note-id {
            font-size: .75rem;
            color: var(--muted);
            margin-top: .35rem;
        }

        .btn-delete {
            display: flex;
            align-items: center;
            gap: .3rem;
            padding: .4rem .85rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: .8rem;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: border-color .2s, color .2s, background .2s;
        }

        .btn-delete:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255,92,92,.1);
        }
    </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────────── -->
<nav>
    <div class="nav-brand">📝 Notes App</div>
    <div class="nav-right">
        <span class="nav-user">Signed in as <span th:text="${username}">user</span></span>
        <!-- Spring Security logout via POST (default), using a GET link with a hidden form trick -->
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout" id="logoutBtn">Sign Out</button>
        </form>
    </div>
</nav>

<!-- ── Main ────────────────────────────────────────────── -->
<main>
    <h1>My Notes</h1>
    <p class="page-sub">Capture your thoughts, ideas, and reminders.</p>

    <!-- Add note form -->
    <div class="add-card">
        <h2>✏️ New Note</h2>
        <form th:action="@{/notes}" method="post" id="addNoteForm">
            <div class="add-row">
                <textarea id="content" name="content"
                          placeholder="Write your note here…"
                          required maxlength="1000"></textarea>
                <button type="submit" class="btn-add" id="addNoteBtn">Add Note</button>
            </div>
        </form>
    </div>

    <!-- Notes list -->
    <div class="notes-header">
        <h2>Your Notes</h2>
        <span class="count-badge" th:text="${notes.size()} + ' note(s)'">0 notes</span>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${notes.isEmpty()}">
        <div class="emoji">🗒️</div>
        <p>No notes yet. Add your first note above!</p>
    </div>

    <!-- Note cards -->
    <div th:each="note : ${notes}" class="note-card">
        <div>
            <div class="note-content" th:text="${note.content}">Note content</div>
            <div class="note-id">#<span th:text="${note.id}">1</span></div>
        </div>
        <a th:href="@{/notes/delete/{id}(id=${note.id})}"
           class="btn-delete"
           th:id="'deleteBtn-' + ${note.id}"
           onclick="return confirm('Delete this note?')">
            🗑 Delete
        </a>
    </div>
</main>

</body>
</html>
